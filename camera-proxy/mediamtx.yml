###############################################
# AttendanceAI camera proxy config — Production (Linux)
# RTSP cameras publish here; MediaMTX serves HLS on :8888.
# Camera paths are created dynamically by the provisioning-agent via the API.

logLevel: info

rtspAddress: ':8554'
rtpAddress: ':8000'
rtcpAddress: ':8001'

hls: yes
hlsAddress: ':8888'

webrtc: no
rtmp: no
srt: no

api: yes
apiAddress: '127.0.0.1:9997'

# Disable auth so HLS child playlists and segments are readable without
# credentials. The API is already restricted to localhost (127.0.0.1:9997)
# so there is no external API exposure. RTSP/HLS operate on a trusted LAN.
authMethod: no

# Allow ALL paths (dynamic publisher + re-stream).
# Provisioning-agent adds per-camera paths via the API; this wildcard ensures
# any RTSP publisher or source can be accepted without pre-configuration.
paths:
  all_others: